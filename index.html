<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新月通信係 | Calibration Tower</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --text: #1A1A1A;
    --text-secondary: #5C5C5C;
    --accent: #2C5F7C;
    --accent-light: #E8F0F5;
    --border: #E0DDD8;
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    font-weight: 400;
  }

  .page {
    max-width: 760px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* Header */
  header {
    margin-bottom: 56px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Source Serif 4', serif;
    font-size: 1.75rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }

  header .sub {
    font-size: 0.85rem;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
  }

  nav {
    margin-top: 14px;
    display: flex;
    gap: 20px;
  }

  nav a {
    font-size: 0.82rem;
    color: var(--text-secondary);
    text-decoration: none;
    letter-spacing: 0.04em;
  }

  nav a:hover {
    color: var(--accent);
  }

  nav a.active {
    color: var(--accent);
    font-weight: 500;
  }

  /* Sections */
  section {
    margin-bottom: 48px;
  }

  section h2 {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--accent-light);
  }

  /* News list */
  .news-list {
    list-style: none;
  }

  .news-list li {
    display: flex;
    gap: 24px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    align-items: baseline;
  }

  .news-list li:first-child {
    border-top: 1px solid var(--border);
  }

  .news-date {
    font-size: 0.82rem;
    color: var(--text-secondary);
    white-space: nowrap;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .news-title {
    font-size: 0.92rem;
  }

  .news-title a {
    color: var(--text);
    text-decoration: none;
  }

  .news-title a:hover {
    color: var(--accent);
  }

  /* About summary */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
  }

  .summary-card p {
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }

  .summary-card a {
    font-size: 0.85rem;
    color: var(--accent);
    text-decoration: none;
  }

  .summary-card a:hover {
    text-decoration: underline;
  }

  /* Links */
  .ext-links {
    list-style: none;
    display: flex;
    gap: 24px;
  }

  .ext-links a {
    font-size: 0.9rem;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .ext-links a:hover {
    border-bottom-color: var(--accent);
  }

  /* Footer */
  footer {
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--text-secondary);
    text-align: center;
  }

  /* Responsive */
  @media (max-width: 560px) {
    .ext-links {
      flex-direction: column;
      gap: 12px;
    }

    .news-list li {
      flex-direction: column;
      gap: 2px;
    }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>新月通信係</h1>
    <div class="sub">Calibration Tower</div>
    <nav>
      <a href="index.html" class="active">トップ</a>
      <a href="services.html">サービス</a>
      <a href="about.html">事業概要</a>
    </nav>
  </header>

  <section>
    <h2>お知らせ</h2>
    <ul class="news-list">
      <li>
        <span class="news-date">2026年4月12日</span>
        <span class="news-title"><a href="about.html">事業概要ページを公開しました</a></span>
      </li>
      <li>
        <span class="news-date">2026年4月4日</span>
        <span class="news-title">新月通信係 開業</span>
      </li>
    </ul>
  </section>

  <section>
    <h2>このサイトについて</h2>
    <div class="summary-card">
      <p>新月通信係（Calibration Tower）は、AI出力の品質検査・評価およびAI活用コンサルティングを提供する個人事業です。</p>
      <a href="about.html">事業概要・サービス詳細 →</a>
    </div>
  </section>

  <section>
    <h2>外部リンク</h2>
    <ul class="ext-links">
      <li><a href="https://github.com/karine-mue" target="_blank" rel="noopener">GitHub</a></li>
      <li><a href="https://youtube.com/@karine_tln?=si=7zqHDKzrECZ8NKD-" target="_blank" rel="noopener">YouTube</a></li>
      <li><a href="https://note.com/karine_tln" target="_blank" rel="noopener">note.com</a></li>
    </ul>
  </section>

  <footer>
    &copy; 2026 新月通信係（Calibration Tower）
  </footer>

</div>
</body>
</html>
